name: Build ImmortalWrt v25.12.3 for AX6000 U-BootMod

on:
  workflow_dispatch:
    inputs:
      branch:
        description: 'ImmortalWrt Branch'
        required: true
        default: 'openwrt-25.12'
        type: choice
        options:
          - openwrt-25.12
          - master
      release:
        description: 'Create Release'
        required: false
        default: true
        type: boolean

env:
  REPO_URL: https://github.com/immortalwrt/immortalwrt.git
  REPO_BRANCH: openwrt-25.12
  CONFIG_FILE: configs/ax6000-ubootmod.config
  FILES_DIR: files
  TZ: Asia/Shanghai

jobs:
  build:
    runs-on: ubuntu-24.04
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Initialize Environment
        env:
          DEBIAN_FRONTEND: noninteractive
        run: |
          sudo rm -rf /etc/apt/sources.list.d/* /usr/share/dotnet /usr/local/lib/android /opt/ghc
          sudo -E apt-get -qq update
          sudo -E apt-get -qq install -y \
            ack antlr3 asciidoc autoconf automake autopoint binutils bison build-essential \
            bzip2 ccache cmake cpio curl device-tree-compiler fastjar flex gawk gettext \
            gcc-multilib g++-multilib git gperf haveged help2man intltool libc6-dev-i386 \
            libelf-dev libglib2.0-dev libgmp3-dev libltdl-dev libmpc-dev libmpfr-dev \
            libncurses5-dev libncursesw5-dev libreadline-dev libssl-dev libtool lrzsz \
            mkisofs msmtp nano ninja-build p7zip p7zip-full patch pkgconf python3 \
            python3-pyelftools libpython3-dev qemu-utils rsync scons squashfs-tools \
            subversion swig texinfo uglifyjs upx-ucl unzip vim wget xmlto xxd zlib1g-dev
          sudo -E apt-get -qq autoremove --purge
          sudo -E apt-get -qq clean
          sudo timedatectl set-timezone "$TZ"

      - name: Clone ImmortalWrt Source
        run: |
          git clone --depth 1 -b $REPO_BRANCH $REPO_URL openwrt
          cd openwrt
          echo "=== ImmortalWrt Version Info ==="
          cat include/version.mk 2>/dev/null | grep -E "VERSION_NUMBER|VERSION_CODE|VERSION_DIST" || true
          echo "=== Kernel Version ==="
          ls target/linux/mediatek/Makefile 2>/dev/null && grep KERNEL target/linux/mediatek/Makefile | head -5 || true
          echo "=================================="

      - name: Update & Install Feeds
        run: |
          cd openwrt
          ./scripts/feeds update -a
          ./scripts/feeds install -a

      - name: Load Custom Configuration
        run: |
          [ -e $CONFIG_FILE ] && cp $CONFIG_FILE openwrt/.config
          [ -d $FILES_DIR ] && cp -r $FILES_DIR openwrt/files

      - name: Generate Configuration
        run: |
          cd openwrt
          make defconfig

      - name: Download Package Sources
        run: |
          cd openwrt
          make download -j$(nproc) || make download -j1 V=s
          find dl -size -1024c -exec rm -f {} \;

      - name: Compile Firmware
        id: compile
        run: |
          cd openwrt
          make -j$(nproc) || make -j1 V=s
          echo "status=success" >> $GITHUB_OUTPUT

      - name: Organize Output Files
        if: steps.compile.outputs.status == 'success'
        run: |
          cd openwrt/bin/targets/*
          mkdir -p $GITHUB_WORKSPACE/output
          cp -f *-sysupgrade.bin $GITHUB_WORKSPACE/output/ 2>/dev/null || true
          cp -f *.manifest $GITHUB_WORKSPACE/output/ 2>/dev/null || true
          ls -la $GITHUB_WORKSPACE/output/

      - name: Upload Artifacts
        if: steps.compile.outputs.status == 'success'
        uses: actions/upload-artifact@v4
        with:
          name: ImmortalWrt-v25.12.3-AX6000-${{ github.run_number }}
          path: output/

      - name: Create Release
        if: steps.compile.outputs.status == 'success' && github.event.inputs.release == 'true'
        uses: softprops/action-gh-release@v1
        with:
          tag_name: v25.12.3-AX6000-${{ github.run_number }}
          name: ImmortalWrt v25.12.3 AX6000 U-BootMod $(date +%Y-%m-%d)
          body: |
            ## ImmortalWrt v25.12.3 for Redmi AX6000 (U-BootMod)
            
            **分支**: openwrt-25.12
            **内核**: 6.12 LTS
            **OpenWrt 服务版本**: 25.12.3 (2026-05-07)
            **编译日期**: $(date +%Y-%m-%d)
            
            ### 默认配置
            - LuCI: `192.168.1.1`
            - 密码: `lkg030418`
            - SSH: 已开启 (端口22)
            - 主题: Argon
            
            ### 预装插件
            - HomeProxy (sing-box)
            - AdGuard Home
            - FRPC
            - DDNS
            
            ### WiFi 配置
            - 2.4G: `Ryan` / `TangoMoment` (HE40)
            - 5G: `Ryan_5G` / `TangoMoment` (信道149, HE80)
            
            ### 刷机说明
            1. 确保已刷入 U-BootMod
            2. 按住 Reset 通电进入恢复模式
            3. 上传 sysupgrade 固件
            4. 首次启动约 3-5 分钟
            
            ⚠️ 基于 ImmortalWrt 25.12 稳定分支，内核 6.12 LTS
          files: output/*
